apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "universal-chart.fullname" . }}
  labels:
    {{- include "universal-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "universal-chart.selectorLabels" . | nindent 6 }}
  template:
    {{- $vaultEnabled := or .Values.global.vault.enabled (and .Values.vault .Values.vault.enabled | default false) }}
    {{- $vaultSecrets := merge (default (dict) .Values.global.vault.secrets) (and .Values.vault .Values.vault.secretPaths | default (dict)) }}
    metadata:
      labels:
        {{- include "universal-chart.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if $vaultEnabled }}
        # Vault Agent Sidecar Injector
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ and .Values.vault .Values.vault.role | default .Values.global.vault.role | default (printf "am-%s-role" (include "universal-chart.fullname" .)) | quote }}
        vault.hashicorp.com/auth-path: {{ and .Values.vault .Values.vault.authPath | default .Values.global.vault.authPath | default "auth/kubernetes" | quote }}
        vault.hashicorp.com/agent-pre-populate-only: "false"
        {{- range $k, $v := $vaultSecrets }}
        vault.hashicorp.com/agent-inject-secret-{{ $k }}: {{ if kindIs "string" $v }}{{ $v | quote }}{{ else }}{{ $v.path | quote }}{{ end }}
        vault.hashicorp.com/agent-inject-template-{{ $k }}: |
          {{`{{- with secret `}} {{ if kindIs "string" $v }}{{ $v | quote }}{{ else }}{{ $v.path | quote }}{{ end }} {{` -}}`}}
          {{- if and (not (kindIs "string" $v)) $v.mappings }}
          {{- range $moduleVar, $vaultKey := $v.mappings }}
          {{- if eq $vaultKey "__jaas__" }}
          {{`export `}}{{ $moduleVar }}{{`="org.apache.kafka.common.security.scram.ScramLoginModule required username=\"{{ .Data.data.username }}\" password=\"{{ .Data.data.password }}\";"`}}
          {{- else }}
          {{`export `}}{{ $moduleVar }}="{{`{{`}} index .Data.data {{ $vaultKey | quote }} {{`}}`}}"
          {{- end }}
          {{- end }}
          {{- else if and (not (kindIs "string" $v)) $v.template }}
          {{ $v.template | nindent 10 }}
          {{- else if and (not (kindIs "string" $v)) $v.keys }}
          {{- range $varName := $v.keys }}
          export {{ $varName }}="{{`{{`}} index .Data.data {{ $varName | quote }} {{`}}`}}"
          {{- end }}
          {{- else }}
          {{`{{- range $sk, $sv := .Data.data }}`}}
          {{`export `}}{{`{{ $sk | toUpper }}`}}="{{`{{ $sv }}`}}"
          {{`{{- end }}`}}
          {{- end }}
          {{`{{- end }}`}}
        {{- end }}
        {{- end }}
    spec:
      {{- with .Values.global.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $vaultEnabled }}
      serviceAccountName: {{ and .Values.vault .Values.vault.serviceAccountName | default .Values.global.vault.serviceAccountName | default (printf "%s-vault-sa" (include "universal-chart.fullname" .)) }}
      {{- end }}
      automountServiceAccountToken: {{ if $vaultEnabled }}true{{ else }}{{ .Values.security.automountServiceAccountToken | default false }}{{ end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ include "universal-chart.fullname" . }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem | default false }}
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.global.image.registry }}/{{ .Values.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          {{- if $vaultEnabled }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- range $k, $v := $vaultSecrets }}
              . /vault/secrets/{{ $k }} 2>/dev/null || true
              {{- end }}
              {{- if eq .Values.language "java" }}
              exec java -jar app.jar
              {{- else if eq .Values.language "flutter" }}
              exec nginx -g "daemon off;"
              {{- else }}
              {{ default (printf "exec uvicorn am_api.api:app --host 0.0.0.0 --port %v" .Values.port) .Values.entrypoint }}
              {{- end }}
          {{- end }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- if .Values.env }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k | quote }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ if and .Values.probes .Values.probes.liveness }}{{ .Values.probes.liveness.path | default "/health" }}{{ else }}"/health"{{ end }}
              port: {{ if .Values.probes }}{{ .Values.probes.port | default .Values.port }}{{ else }}{{ .Values.port }}{{ end }}
            initialDelaySeconds: {{ if and .Values.probes .Values.probes.liveness }}{{ .Values.probes.liveness.initialDelaySeconds | default 30 }}{{ else }}30{{ end }}
            periodSeconds: {{ if and .Values.probes .Values.probes.liveness }}{{ .Values.probes.liveness.periodSeconds | default 30 }}{{ else }}30{{ end }}
            timeoutSeconds: {{ if and .Values.probes .Values.probes.liveness }}{{ .Values.probes.liveness.timeoutSeconds | default 10 }}{{ else }}10{{ end }}
            failureThreshold: {{ if and .Values.probes .Values.probes.liveness }}{{ .Values.probes.liveness.failureThreshold | default 3 }}{{ else }}3{{ end }}
          readinessProbe:
            httpGet:
              path: {{ if and .Values.probes .Values.probes.readiness }}{{ .Values.probes.readiness.path | default "/health" }}{{ else }}"/health"{{ end }}
              port: {{ if .Values.probes }}{{ .Values.probes.port | default .Values.port }}{{ else }}{{ .Values.port }}{{ end }}
            initialDelaySeconds: {{ if and .Values.probes .Values.probes.readiness }}{{ .Values.probes.readiness.initialDelaySeconds | default 5 }}{{ else }}5{{ end }}
            periodSeconds: {{ if and .Values.probes .Values.probes.readiness }}{{ .Values.probes.readiness.periodSeconds | default 10 }}{{ else }}10{{ end }}
            timeoutSeconds: {{ if and .Values.probes .Values.probes.readiness }}{{ .Values.probes.readiness.timeoutSeconds | default 5 }}{{ else }}5{{ end }}
            failureThreshold: {{ if and .Values.probes .Values.probes.readiness }}{{ .Values.probes.readiness.failureThreshold | default 3 }}{{ else }}3{{ end }}
