global:
  image:
    registry: ghcr.io/am-portfolio
    tag: latest
    pullPolicy: IfNotPresent
    imagePullSecrets: []
  vault:
    enabled: false
    role: am-backend-role
    authPath: auth/kubernetes
    serviceAccountName: "am-backend-sa" # Standardized backend SA
    secrets: {}

environment: default
replicaCount: 1

language: python

image:
  repository: ""

port: 8080

# Security Defaults (Professional Standards)
security:
  # automountServiceAccountToken: false # Now dynamically handled based on Vault status
  readOnlyRootFilesystem: false

# Professional Resource Limits (Satisfies CKV_K8S_21/22/31)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Standard Infrastructure Defaults (Overriden by Vault at runtime)
env:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-256"
  MONGODB_CONNECTION_URL: "mongodb://mongodb.infra.svc.cluster.local:27017"
  REDIS_HOSTNAME: "redis.infra.svc.cluster.local"
  REDIS_PORT: "6379"
