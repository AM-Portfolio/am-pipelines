name: Central Build & Publish

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: "The primary language of the project (e.g., java, python)"
      working_directory:
        required: true
        type: string
        description: "The base directory of the sub-component relative to repo root"
      image_name:
        required: false
        type: string
        description: "Name of the Docker image to build, if applicable"
      registry:
        required: false
        type: string
        default: "ghcr.io"
        description: "Container registry to push to"
      build_context:
        required: false
        type: string
        default: "."
        description: "Docker build context relative to working_directory"
      target_env:
        required: false
        type: string
        default: "local"
        description: "The target environment to deploy to (e.g., local, aks)"
      environment:
        required: false
        type: string
        default: "preprod"
        description: "GitHub Environment name (must match the environment configured with approval rules in GitHub Settings)"
      namespace:
        required: false
        type: string
        default: "am-apps-preprod"
        description: "Kubernetes namespace to deploy into"

jobs:
  # ===============================
  # BUILD JOB — GitHub-hosted runner
  # Builds and pushes Docker image to GHCR
  # ===============================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v4

      # ===============================
      # Java Setup & Build
      # ===============================
      - name: Set up JDK
        if: ${{ inputs.language == 'java' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github-investment
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          
      - name: Build Java Package
        if: ${{ inputs.language == 'java' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn clean package -DskipTests

      - name: Run Java Tests
        if: ${{ inputs.language == 'java' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn test || echo "Test step failed or skipped"

      # ===============================
      # Python Setup & Build
      # ===============================
      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Python Dependencies
        if: ${{ inputs.language == 'python' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Python Tests
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install pytest flake8
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          pytest || echo "Tests failed or not found - marking as skipped for now"

      # ===============================
      # Container Build & Push to GHCR
      # ===============================
      - name: Log in to GitHub Container Registry
        if: ${{ inputs.image_name != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push Docker Container
        if: ${{ inputs.image_name != '' }}
        run: |
          IMAGE_ID=${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          # Docker names must be lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          BASE_REG="ghcr.io/${{ github.repository_owner }}/"
          BASE_REG=$(echo $BASE_REG | tr '[A-Z]' '[a-z]')
          
          echo "Building container for $IMAGE_ID..."
          docker build -f Dockerfile --build-arg BASE_REGISTRY=$BASE_REG -t $IMAGE_ID:${{ github.run_number }} -t $IMAGE_ID:latest ${{ inputs.build_context }}
          
          echo "Pushing container to $IMAGE_ID..."
          docker push $IMAGE_ID:${{ github.run_number }}
          docker push $IMAGE_ID:latest

  # ===============================
  # DEPLOY JOB — Self-hosted runner (Windows + kubectl + helm)
  # Runs Helm upgrade against AKS and verifies rollout
  # ===============================
  deploy:
    needs: build
    runs-on: self-hosted
    if: ${{ inputs.image_name != '' }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
           # ← Pauses here for approval if env has required reviewers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: powershell
        run: |
          $sha = $env:GITHUB_SHA.Substring(0,7)
          echo "sha_short=$sha" >> $env:GITHUB_OUTPUT

      - name: Checkout Universal Helm Chart
        uses: actions/checkout@v4
        with:
          repository: AM-Portfolio/am-pipelines
          path: am-pipelines-repo

      - name: Deploy via Helm to AKS
        shell: powershell
        run: |
          $chartDir = ""
          if (Test-Path "${{ inputs.working_directory }}/helm") {
            $chartDir = (Get-ChildItem "${{ inputs.working_directory }}/helm" -Directory | Select-Object -First 1).FullName
          }

          $valuesArg = ""
          if ($chartDir -and (Test-Path "$chartDir/values.yaml")) {
            $valuesArg = "-f `"$chartDir/values.yaml`""
          }

          Write-Host "🚀 Deploying ${{ inputs.image_name }} to namespace ${{ inputs.namespace }}..."
          $cmd = "helm upgrade --install ${{ inputs.image_name }} ./am-pipelines-repo/helm/universal-chart " +
            "--namespace ${{ inputs.namespace }} " +
            "--set global.image.registry=`"${{ inputs.registry }}/${{ github.repository_owner }}`" " +
            "--set global.image.tag=`"${{ github.run_number }}`" " +
            "--set global.image.pullPolicy=`"Always`" " +
            $valuesArg
          Invoke-Expression $cmd

      - name: Verify Rollout
        shell: powershell
        run: |
          $ns = "${{ inputs.namespace }}"
          $dep = "${{ inputs.image_name }}"
          $timeout = "10m"

          Write-Host "⏳ Waiting for rollout: $dep in namespace $ns ..."
          kubectl rollout status deployment/$dep -n $ns --timeout=$timeout

          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Rollout FAILED for $dep"
            Write-Host ""
            Write-Host "=== Pod Status ==="
            kubectl get pods -n $ns
            Write-Host ""
            Write-Host "=== Recent Events ==="
            kubectl get events -n $ns --sort-by='.lastTimestamp' | Select-Object -Last 20
            exit 1
          } else {
            Write-Host "✅ $dep is healthy"
          }

      - name: Rollout Summary (on failure)
        if: failure()
        shell: powershell
        run: |
          Write-Host "🔍 Deployment failed. Full pod diagnostics:"
          kubectl get pods -n ${{ inputs.namespace }} -o wide
          Write-Host ""
          Write-Host "--- Describe: ${{ inputs.image_name }} ---"
          kubectl describe deployment/${{ inputs.image_name }} -n ${{ inputs.namespace }} 2>&1 | Select-Object -Last 30
