name: Central SDK Publish

on:
  workflow_call:
    inputs:
      language:
        description: 'Programming language of the SDK'
        required: true
        type: string
      working_directory:
        description: 'Directory containing the project files'
        required: true
        type: string
      package_name:
        description: 'Output package name'
        required: false
        type: string
      github_repository:
        description: 'GitHub repository in owner/repo format (used for GitHub Packages URL)'
        required: false
        type: string
        default: ''

jobs:
  publish:
    name: Build and Publish Library
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Java (Maven) Section ---
      - name: Set up JDK 17
        if: ${{ inputs.language == 'java' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Temporary Maven Settings
        if: ${{ inputs.language == 'java' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          rm -rf settings.xml
          cat <<EOF > settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                http://maven.apache.org/xsd/settings-1.0.0.xsd">
              <servers>
                  <server>
                      <id>github</id>
                      <username>\${env.GITHUB_ACTOR}</username>
                      <password>\${env.GITHUB_TOKEN}</password>
                  </server>
                  <server>
                      <id>github-investment</id>
                      <username>\${env.GITHUB_ACTOR}</username>
                      <password>\${env.GITHUB_TOKEN}</password>
                  </server>
              </servers>
          </settings>
          EOF

      - name: Publish Java SDK
        if: ${{ inputs.language == 'java' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          mvn clean deploy -DskipTests --settings settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Flutter (Dart) Section ---
      - name: Set up Flutter
        if: ${{ inputs.language == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Verify Flutter SDK
        if: ${{ inputs.language == 'flutter' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          flutter pub get
          flutter analyze
          if [ -d "test" ]; then
            flutter test
          else
            echo "No 'test' directory found, skipping 'flutter test'."
          fi
          # Note: Verification step for library integrity.
          # Publishing to private pub servers would involve 'dart pub publish --hosted ...'

      # --- Python Section ---
      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build and Publish Python SDK
        if: ${{ inputs.language == 'python' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          REPO="${{ inputs.github_repository }}"
          if [ -z "$REPO" ]; then
            REPO="${{ github.repository }}"
          fi
          REGISTRY_URL="https://pypi.pkg.github.com/${REPO}/"
          echo "Publishing to: $REGISTRY_URL"
          python -m twine upload --verbose --repository-url "$REGISTRY_URL" dist/*
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
