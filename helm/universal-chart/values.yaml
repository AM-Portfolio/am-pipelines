global:
  image:
    registry: ghcr.io/AM-Portfolio
    tag: latest
    pullPolicy: IfNotPresent
    imagePullSecrets: []
  vault:
    enabled: false
    role: dev-role
    authPath: auth/kubernetes
    serviceAccountName: ""   # Set to existing SA name (e.g. am-backend-sa) to skip SA creation
    secrets: {}

environment: default
replicaCount: 1

language: python

image:
  repository: ""

port: 8080

# Security Defaults (Professional Standards)
security:
  automountServiceAccountToken: false
  readOnlyRootFilesystem: false

# Professional Resource Limits (Satisfies CKV_K8S_21/22/31)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

env: {}
