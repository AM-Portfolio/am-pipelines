global:
  image:
    registry: ghcr.io/AM-Portfolio
    tag: latest
    pullPolicy: IfNotPresent
  vault:
    enabled: false
    role: dev-role
    authPath: auth/kubernetes
    serviceAccountName: ""   # Set to existing SA name (e.g. am-backend-sa) to skip SA creation
    secrets: {}

environment: default
replicaCount: 1

language: python

image:
  repository: ""

port: 8080

# Optional explicit command to override language defaults
entrypoint: ""

resources: {}
env: {}
